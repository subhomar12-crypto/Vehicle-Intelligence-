[alembic]
script_location = predict/core/db/migrations
prepend_sys_path = .

# Database URL - overridden by env.py from .env
sqlalchemy.url = postgresql+asyncpg://YOUR_DB_USER:YOUR_DB_PASSWORD@localhost:5432/predict

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
